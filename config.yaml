# agentsmith — minimal MCP-aware gateway with per-target header injection.
# Showcases the feature agentgateway 1.2 lacks: federation across backends
# while keeping each backend's secrets scoped to its own connection.

listenAddr: ":3001"
path: /mcp

targets:
- name: dodo
  url: http://127.0.0.1:8765/mcp
  headers:
    X-Dodo-API-Key: ${DODO_PAYMENTS_API_KEY}
    X-Dodo-Webhook-Key: ${DODO_PAYMENTS_WEBHOOK_KEY}

- name: slack
  url: http://127.0.0.1:8766/mcp
  headers:
    X-Slack-Token: ${SLACK_TOKEN}
