# agentsmith configuration example.
# Copy this file to config.yaml (gitignored) and fill in your values.
# Secrets are referenced via ${VAR} — set them in agentsmith.env or your environment.

listenAddr: ":3001"
adminAddr: ":3002" # internal status/admin API — keep off public interfaces
path: /mcp

# authMode controls who can call the MCP endpoint.
#   unprotected (default): anyone reaching /mcp is treated as the "default"
#     user. All connected OAuth identities are shared. Suitable for solo or
#     trusted-network deployments. A warning banner appears in the admin UI.
#   protected: requires Authorization: Bearer <api_key>. Create users via
#     the admin UI at /users; each user gets their own OAuth identities.
authMode: unprotected

# oauth.callbackBaseUrl is the gateway's public URL used to build the OAuth
# redirect_uri sent to upstream authorization servers. Always set this in
# production deployments behind a reverse proxy, NAT, or any setup where the
# public hostname differs from what `r.Host` carries. When empty, the URL is
# derived from the incoming request — with no proxy-header magic unless you
# also set trustForwardedHeaders below.
#
# oauth.trustForwardedHeaders lets the auto-derived base URL honour
# X-Forwarded-Proto / X-Forwarded-Host. Default is false because those
# headers are caller-controlled and could let an attacker reaching the admin
# port (which carries the OAuth routes) redirect callbacks to an arbitrary
# host. Only enable when you know your proxy strips/overwrites them; prefer
# setting callbackBaseUrl explicitly.
#
# oauth.ticketKey signs the short-lived ticket embedded in connect URLs.
# Leaving it empty generates a fresh key per restart, which invalidates any
# previously-issued connect URLs. Set a stable secret for production.
oauth:
    callbackBaseUrl: ""
    trustForwardedHeaders: false
    ticketKey: ${OAUTH_TICKET_KEY}

# logging controls the root structured logger and HTTP access logging.
#   level:  debug | info | warn | error  (default: info)
#           Override at runtime via LOG_LEVEL env var.
#   format: json | text                  (default: json, aggregator-ready)
#           Override at runtime via LOG_FORMAT env var; local dev typically
#           sets LOG_FORMAT=text in agentsmith.env for human-readable output.
#   access.mcp / access.admin: (default both true)
#           Emit one Info-level access record per HTTP request on each
#           server. Disable selectively to silence high-volume traffic.
#
# Bodies are never logged. Request/response sizes and durations are.
logging:
    level: info
    format: json
    access:
        mcp: true
        admin: true

targets:
    # Static-credential backend: same shape as before — a fixed Authorization
    # header that every caller shares.
    - name: dodo
      url: http://127.0.0.1:8765/mcp
      headers:
          X-Dodo-API-Key: ${DODO_PAYMENTS_API_KEY}
          X-Dodo-Webhook-Key: ${DODO_PAYMENTS_WEBHOOK_KEY}

    # OAuth backend: each end user connects their own account via the admin
    # UI. The gateway holds the tokens and refreshes them automatically.
    #
    # By default the gateway runs MCP-spec discovery against the URL above
    # (/.well-known/oauth-protected-resource then
    # /.well-known/oauth-authorization-server) and performs Dynamic Client
    # Registration (RFC 7591) on first connect — no clientId/clientSecret
    # required. Provide them only when the upstream does not support DCR or
    # you prefer a pre-registered app.
    - name: slack
      url: https://slack.example.com/mcp
      auth:
          type: oauth
          # clientId: ${SLACK_CLIENT_ID}           # optional — DCR runs when omitted
          # clientSecret: ${SLACK_CLIENT_SECRET}
          # scopes: [channels:read, chat:write]    # optional — providers usually advertise defaults
          # authorizationUrl: ...                  # optional override when discovery fails
          # tokenUrl: ...
