name: Publish image

# Builds and publishes a multi-arch (amd64 + arm64) container image to Docker Hub.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME — your Docker Hub username (used for login + image namespace)
#   DOCKERHUB_TOKEN    — a Docker Hub access token (not your account password)
#
# Tagging strategy:
#   pushes to main         → :edge, :sha-<short>
#   tag pushes vX.Y.Z      → :latest, :X.Y.Z, :X.Y, :X, :sha-<short>
#   manual workflow_dispatch runs build but only push if the secret is set.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: build · push (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Docker Hub credentials presence
        id: creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub credentials not configured — running build only, skipping push."
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.creds.outputs.have_creds == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Fall back to the GitHub repo name when DOCKERHUB_USERNAME is unset so
          # metadata-action does not fail with an empty `images:` input.
          images: ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/agentsmith', secrets.DOCKERHUB_USERNAME) || format('{0}/agentsmith', github.repository_owner) }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Only push when Docker Hub credentials are configured. Forks and
          # credential-less manual runs still validate the build via Buildx.
          push: ${{ steps.creds.outputs.have_creds == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
