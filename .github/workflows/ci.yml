name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vet · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (race detector)
        run: go test -race -count=1 ./...

      - name: go build
        run: go build ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true
          cache: false

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.6
